<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRHH · Sistema de Gestión</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }
.container { max-width: 900px; margin: auto; padding: 20px; }

.card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; }

button { padding: 10px; cursor: pointer; }

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}
</style>
</head>
<body>

<div id="app" class="container">
  <h1>Manuales</h1>
  <button onclick="adminUI.openModal()">+ Nuevo</button>
  <div id="list"></div>
</div>

<div id="firma" style="display:none" class="container">
  <div class="card" id="pdf">
    <h2 id="titulo"></h2>
    <pre id="contenido"></pre>

    <div id="firmaInfo" style="display:none">
      <hr>
      <h3 id="nombreFirma"></h3>
      <p id="fechaFirma"></p>
    </div>
  </div>

  <input id="nombre" placeholder="Tu nombre completo">
  <button id="firmarBtn" disabled>Firmar</button>
</div>

<div id="modal" style="display:none" class="container">
  <div class="card">
    <input id="m-titulo" placeholder="Título">
    <input id="m-local" placeholder="Local">
    <textarea id="m-texto" placeholder="Contenido"></textarea>

    <button onclick="adminUI.save()">Guardar</button>
    <button onclick="adminUI.closeModal()">Cancelar</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "rrhhsystem.firebaseapp.com",
  projectId: "rrhhsystem"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentDoc = null;

/* =========================
   UTIL
========================= */
function sanitize(t) {
  return t.replace(/[<>]/g, "");
}

/* =========================
   INICIO
========================= */
async function start() {
  const params = new URLSearchParams(location.search);
  const id = params.get("firma");

  if (id) {
    document.getElementById("app").style.display = "none";
    document.getElementById("firma").style.display = "block";

    const snap = await db.collection("manuales").doc(id).get();
    if (!snap.exists) return alert("No existe");

    currentDoc = { id: snap.id, ...snap.data() };

    document.getElementById("titulo").textContent = currentDoc.nombre;
    document.getElementById("contenido").textContent = currentDoc.contenido;
  } else {
    adminUI.init();
  }
}

/* =========================
   FIRMA
========================= */
document.getElementById("nombre").addEventListener("input", e => {
  document.getElementById("firmarBtn").disabled = e.target.value.trim().length < 5;
});

document.getElementById("firmarBtn").addEventListener("click", async () => {
  const nombre = sanitize(document.getElementById("nombre").value.trim());
  const fecha = new Date().toLocaleString();

  await db.collection("manuales").doc(currentDoc.id).update({
    firmas: firebase.firestore.FieldValue.arrayUnion({
      nombre,
      at: new Date().toISOString()
    })
  });

  await generarPDF(nombre, fecha);

  alert("Firmado correctamente");
});

/* =========================
   PDF MULTIPAGE
========================= */
async function generarPDF(nombre, fecha) {
  const cont = document.getElementById("pdf");
  const clone = cont.cloneNode(true);

  clone.querySelector("#firmaInfo").style.display = "block";
  clone.querySelector("#nombreFirma").textContent = nombre;
  clone.querySelector("#fechaFirma").textContent = fecha;

  clone.style.position = "absolute";
  clone.style.top = "-9999px";
  clone.style.width = "800px";

  document.body.appendChild(clone);

  const canvas = await html2canvas(clone, { scale: 2 });
  const img = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const w = 210;
  const h = (canvas.height * w) / canvas.width;

  let heightLeft = h;
  let position = 0;

  pdf.addImage(img, "PNG", 0, position, w, h);
  heightLeft -= 297;

  while (heightLeft > 0) {
    position = heightLeft - h;
    pdf.addPage();
    pdf.addImage(img, "PNG", 0, position, w, h);
    heightLeft -= 297;
  }

  pdf.save("firma.pdf");

  document.body.removeChild(clone);
}

/* =========================
   ADMIN
========================= */
const adminUI = {
  docs: [],

  init() {
    db.collection("manuales").onSnapshot(snap => {
      this.docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      this.render();
    });
  },

  render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    this.docs.forEach(d => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${d.nombre}</h3>
        <p>${d.local || ""}</p>
        <button data-id="${d.id}" class="linkBtn">Copiar link</button>
      `;

      div.querySelector(".linkBtn").addEventListener("click", () => {
        const url = location.origin + location.pathname + "?firma=" + d.id;
        navigator.clipboard.writeText(url);
        alert("Copiado");
      });

      list.appendChild(div);
    });
  },

  openModal() {
    document.getElementById("modal").style.display = "block";
  },

  closeModal() {
    document.getElementById("modal").style.display = "none";
  },

  async save() {
    const nombre = document.getElementById("m-titulo").value;
    const local = document.getElementById("m-local").value;
    const contenido = document.getElementById("m-texto").value;

    await db.collection("manuales").add({
      nombre,
      local,
      contenido,
      firmas: []
    });

    this.closeModal();
  }
};

start();
</script>

</body>
</html>
