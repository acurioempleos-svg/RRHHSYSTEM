<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RRHH · Sistema de Gestión</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f7f8fa; --surface: #ffffff; --border: #e0e3ea;
    --text: #111827; --muted: #6b7280; --m9: #b45309;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  /* Arreglo de scroll global */
  html, body { 
    height: 100%; 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Syne', sans-serif;
    overflow-y: auto; 
    -webkit-overflow-scrolling: touch;
  }

  /* ── PANTALLA DE FIRMA ── */
  #firma-screen {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: var(--surface); flex-direction: column;
    height: 100dvh; width: 100vw; overflow: hidden;
  }
  #firma-screen.show { display: flex; }

  .firma-container {
    display: flex; flex-direction: column;
    height: 100%; width: 100%; max-width: 800px; margin: 0 auto;
  }

  .firma-header {
    padding: 24px; border-bottom: 1px solid var(--border);
    background: white; flex-shrink: 0;
  }
  .firma-titulo { font-size: 22px; font-weight: 800; }

  /* ÁREA DE SCROLL: Aquí corregimos el "no baja" */
  .firma-scroll-area { 
    flex: 1; 
    overflow-y: auto; 
    padding: 20px; 
    background: #fdfdfd;
    -webkit-overflow-scrolling: touch; /* Scroll suave en iOS */
  }

  #pdf-wrap { background: white; padding: 15px; border-radius: 8px; }
  .pdf-body { font-size: 16px; line-height: 1.6; white-space: pre-wrap; color: #333; }
  
  .pdf-footer-firma {
    margin-top: 40px; padding: 20px; border: 2px solid #f0f0f0; border-radius: 12px;
    display: none; background: #fafafa;
  }

  .firma-controls {
    padding: 20px; border-top: 1px solid var(--border);
    background: white; flex-shrink: 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
  }
  .firma-input {
    width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--border);
    font-size: 16px; margin-bottom: 12px; font-family: 'Syne';
  }
  
  .firma-btn {
    width: 100%; padding: 18px; border: none; border-radius: 12px;
    background: var(--m9); color: white; font-size: 16px; font-weight: 800;
    cursor: pointer;
  }
  .firma-btn:disabled { opacity: 0.3; }

  /* ── DASHBOARD ADMIN ── */
  #app { padding: 20px; max-width: 1000px; margin: 0 auto; }
  .admin-header { margin-bottom: 25px; }
  .man-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .man-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  
  .btn-admin { 
    background: white; border: 1px solid var(--border); padding: 8px 12px; 
    border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .man-firma-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px; background: #f9fafb; border-radius: 8px; margin-top: 6px; font-size: 13px;
  }

  /* Modales */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; padding: 15px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 550px; }
  .modal textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 10px; resize: vertical; }
</style>
</head>
<body>

<div id="firma-screen">
  <div class="firma-container">
    <div class="firma-header">
      <div id="f-local" style="font-size: 10px; font-weight: 800; color: var(--m9); text-transform: uppercase;"></div>
      <h1 class="firma-titulo" id="f-titulo">Cargando...</h1>
    </div>

    <div class="firma-scroll-area">
      <div id="pdf-wrap">
        <div id="f-contenido" class="pdf-body"></div>
        <div id="pdf-footer" class="pdf-footer-firma">
          <p style="font-size: 11px; color: #888; font-family: 'DM Mono'; margin-bottom: 8px;">VALIDADO POR RRHH · FIRMA ELECTRÓNICA</p>
          <p style="font-weight: 800; font-size: 22px; color: #b45309;" id="pdf-nombre-empleado"></p>
          <p style="font-size: 13px; color: #444;" id="pdf-fecha-firma"></p>
          <p style="font-size: 9px; color: #ccc; margin-top: 15px; font-family: 'DM Mono';">ID: <span id="pdf-id-doc"></span></p>
        </div>
      </div>
    </div>

    <div class="firma-controls" id="f-ui">
      <input type="text" id="f-input-nombre" class="firma-input" placeholder="Nombre y Apellido completo" oninput="validarBtn()">
      <button id="f-btn-accion" class="firma-btn" disabled onclick="confirmarFirma()">Firmar y Descargar</button>
    </div>

    <div id="f-success" style="display:none; text-align:center; padding: 40px 20px;">
      <h2 style="font-size: 24px; font-weight: 800;">✅ ¡Documento Firmado!</h2>
      <p style="margin: 15px 0; color: var(--muted);">Tu copia en PDF se descargó. Ya puedes cerrar esta pestaña.</p>
    </div>
  </div>
</div>

<div id="app">
  <div class="admin-header">
    <h2 style="font-weight: 800; font-size: 26px;">Manuales Sabores Incas</h2>
    <button class="firma-btn" style="width:auto; margin-top:15px; padding: 12px 20px;" onclick="admin.abrirEditor()">+ Nuevo Manual</button>
  </div>
  <div class="man-grid" id="man-grid"></div>
</div>

<div class="modal-overlay" id="modal-editor">
  <div class="modal">
    <h3 id="modal-title" style="font-weight:800;">Editar Documento</h3>
    <input type="hidden" id="edit-id">
    <input type="text" id="edit-nombre" class="firma-input" style="margin-top:15px" placeholder="Título">
    <input type="text" id="edit-local" class="firma-input" placeholder="Sede/Local">
    <textarea id="edit-texto" rows="10" placeholder="Contenido legal..."></textarea>
    <div style="display:flex; gap:10px; margin-top:10px">
      <button class="btn-admin" style="flex:1" onclick="admin.cerrarEditor()">Cancelar</button>
      <button class="firma-btn" style="flex:2; padding:12px" onclick="admin.guardar()">Guardar</button>
    </div>
  </div>
</div>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDL4ezIawX3xryjkKyty82DrAQEizmjli8",
  authDomain: "rrhhsystem.firebaseapp.com",
  projectId: "rrhhsystem",
  storageBucket: "rrhhsystem.firebasestorage.app",
  messagingSenderId: "71511125212",
  appId: "1:71511125212:web:03a0ad11b281e397a29819"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let docActual = null;

async function init() {
  const params = new URLSearchParams(window.location.search);
  const idFirma = params.get('firma');
  
  if(idFirma) {
    document.getElementById('app').style.display = 'none';
    document.getElementById('firma-screen').classList.add('show');
    const snap = await db.collection('manuales').doc(idFirma).get();
    if(snap.exists) {
      docActual = {id: snap.id, ...snap.data()};
      document.getElementById('f-titulo').textContent = docActual.nombre;
      document.getElementById('f-local').textContent = docActual.local || 'SABORES INCAS';
      document.getElementById('f-contenido').textContent = docActual.contenido;
      document.getElementById('pdf-id-doc').textContent = snap.id.toUpperCase();
    }
  } else {
    admin.cargar();
  }
}

function validarBtn() {
  const val = document.getElementById('f-input-nombre').value.trim();
  document.getElementById('f-btn-accion').disabled = val.length < 5;
}

async function confirmarFirma() {
  const nombre = document.getElementById('f-input-nombre').value.trim();
  const fecha = new Date().toLocaleString('es-AR');
  const btn = document.getElementById('f-btn-accion');
  
  btn.disabled = true;
  btn.textContent = "Procesando...";

  try {
    const firmas = docActual.firmas || [];
    firmas.push({ nombre, at: new Date().toISOString() });
    await db.collection('manuales').doc(docActual.id).update({ firmas });

    await generarPDF(nombre, fecha, docActual.nombre, docActual.contenido, docActual.id);

    document.getElementById('f-ui').style.display = 'none';
    document.getElementById('f-success').style.display = 'block';
  } catch(e) {
    alert("Error: " + e.message);
    btn.disabled = false;
  }
}

// CORRECCIÓN DEL PDF (EVITA EL ERROR DE "CANVAS EXCEEDS SIZE")
async function generarPDF(nombre, fecha, titulo, texto, id) {
  const wrap = document.getElementById('pdf-wrap');
  const clon = wrap.cloneNode(true);
  
  clon.querySelector('#f-contenido').textContent = texto;
  clon.querySelector('#pdf-nombre-empleado').textContent = nombre;
  clon.querySelector('#pdf-fecha-firma').textContent = "Firmado el: " + fecha;
  clon.querySelector('#pdf-id-doc').textContent = id.toUpperCase();
  clon.querySelector('#pdf-footer').style.display = 'block';

  // Estilos para el clon invisible
  Object.assign(clon.style, {
    position: 'absolute', top: '-9999px', left: '0',
    width: '750px', display: 'block', padding: '30px', background: 'white'
  });
  document.body.appendChild(clon);

  try {
    // Calculamos el alto para ajustar la calidad y no romper el canvas
    const alto = clon.offsetHeight;
    let calidad = 2; // Calidad alta por defecto
    if(alto > 4000) calidad = 1.5; // Si es muy largo, bajamos un poco para que no falle
    if(alto > 7000) calidad = 1;   // Si es extremo, calidad normal

    const canvas = await html2canvas(clon, { scale: calidad, useCORS: true });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    
    const w = pdf.internal.pageSize.getWidth();
    const h = (canvas.height * w) / canvas.width;
    
    pdf.addImage(imgData, 'PNG', 0, 0, w, h);
    pdf.save(`Firma_${nombre.replace(/ /g,'_')}.pdf`);
  } catch(e) {
    console.error(e);
    alert("El manual es muy extenso. Se guardó la firma, pero el PDF falló.");
  } finally {
    document.body.removeChild(clon);
  }
}

const admin = {
  docs: [],
  cargar: function() {
    db.collection('manuales').orderBy('at', 'desc').onSnapshot(snap => {
      this.docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
      this.render();
    });
  },
  render: function() {
    const grid = document.getElementById('man-grid');
    grid.innerHTML = this.docs.map(d => `
      <div class="man-card">
        <div style="font-size:10px; font-weight:800; color:var(--m9)">${(d.local||'GENERAL').toUpperCase()}</div>
        <h3 style="margin:5px 0 15px">${d.nombre}</h3>
        <div style="display:flex; gap:5px; margin-bottom:15px">
          <button class="btn-admin" onclick="admin.link('${d.id}')">🔗 Link</button>
          <button class="btn-admin" onclick="admin.abrirEditor('${d.id}')">✏️</button>
          <button class="btn-admin" style="color:red" onclick="admin.borrar('${d.id}')">🗑️</button>
        </div>
        <div style="border-top:1px solid #eee; padding-top:10px">
          <span style="font-size:11px; font-weight:700">FIRMANTES (${(d.firmas||[]).length})</span>
          <div style="max-height:100px; overflow-y:auto; margin-top:5px">
            ${(d.firmas||[]).map(f => `
              <div class="man-firma-row">
                <span>${f.nombre}</span>
                <button class="btn-admin" style="padding:2px 6px; font-size:10px" onclick="generarPDF('${f.nombre}','${new Date(f.at).toLocaleString()}','${d.nombre}','${d.contenido.replace(/'/g,"")}', '${d.id}')">PDF</button>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `).join('');
  },
  link: function(id) {
    const url = window.location.origin + window.location.pathname + '?firma=' + id;
    navigator.clipboard.writeText(url);
    alert("Link copiado para enviar por WhatsApp.");
  },
  abrirEditor: function(id = null) {
    if(id) {
      const d = this.docs.find(x => x.id === id);
      document.getElementById('edit-id').value = d.id;
      document.getElementById('edit-nombre').value = d.nombre;
      document.getElementById('edit-local').value = d.local || '';
      document.getElementById('edit-texto').value = d.contenido;
    } else {
      document.getElementById('edit-id').value = '';
      document.getElementById('edit-nombre').value = '';
      document.getElementById('edit-local').value = '';
      document.getElementById('edit-texto').value = '';
    }
    document.getElementById('modal-editor').classList.add('open');
  },
  cerrarEditor: () => document.getElementById('modal-editor').classList.remove('open'),
  guardar: async function() {
    const id = document.getElementById('edit-id').value;
    const data = {
      nombre: document.getElementById('edit-nombre').value,
      local: document.getElementById('edit-local').value,
      contenido: document.getElementById('edit-texto').value,
      at: new Date().toISOString()
    };
    if(id) await db.collection('manuales').doc(id).update(data);
    else await db.collection('manuales').add({...data, firmas: []});
    this.cerrarEditor();
  },
  borrar: async function(id) {
    if(confirm("¿Eliminar este manual?")) await db.collection('manuales').doc(id).delete();
  }
};

init();
</script>
</body>
</html>
