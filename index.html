<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH · Sistema de Gestión</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #334155; }
        
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; }
        
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { background: #cbd5e1; }
        
        .hidden { display: none; }
        .item-card { border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="firma-screen" class="container hidden">
        <h1 id="f-titulo">Cargando documento...</h1>
        <div id="f-contenido" style="white-space: pre-wrap; margin-bottom: 20px; line-height: 1.6;"></div>
        <input type="text" id="input-firma" placeholder="Escribe tu nombre completo" oninput="toggleBtn()">
        <button id="btn-firmar" class="btn btn-primary" onclick="procesarFirma()" disabled>Confirmar y Descargar PDF</button>
    </div>

    <div id="admin-screen" class="container hidden">
        <h1>Gestión de Manuales</h1>
        <div id="lista-manuales"></div>
        <hr style="margin: 20px 0;">
        <h3>Crear nuevo</h3>
        <input type="text" id="new-titulo" placeholder="Título">
        <textarea id="new-contenido" rows="5" placeholder="Contenido"></textarea>
        <button class="btn btn-primary" onclick="crearManual()">Crear Manual</button>
    </div>

    <script>
        // --- 1. CONFIGURACION FIREBASE ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "ID",
            appId: "ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Variables Globales
        let currentManual = null;

        // --- 2. LOGICA INICIAL ---
        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('firma');

            if (id) {
                document.getElementById('firma-screen').classList.remove('hidden');
                const doc = await db.collection('manuales').doc(id).get();
                if(doc.exists) {
                    currentManual = { id: doc.id, ...doc.data() };
                    document.getElementById('f-titulo').textContent = currentManual.nombre;
                    document.getElementById('f-contenido').textContent = currentManual.contenido;
                }
            } else {
                document.getElementById('admin-screen').classList.remove('hidden');
                cargarAdmin();
            }
        };

        // --- 3. LOGICA FIRMA Y PDF ---
        function toggleBtn() {
            document.getElementById('btn-firmar').disabled = document.getElementById('input-firma').value.length < 5;
        }

        async function procesarFirma() {
            const nombre = document.getElementById('input-firma').value;
            const btn = document.getElementById('btn-firmar');
            
            btn.textContent = "Generando...";
            
            try {
                // Guardar en BD
                const nuevasFirmas = [...(currentManual.firmas || []), { nombre, at: new Date().toISOString() }];
                await db.collection('manuales').doc(currentManual.id).update({ firmas: nuevasFirmas });
                
                // Generar PDF
                const docDefinition = {
                    content: [
                        { text: 'CERTIFICADO DE CONFORMIDAD', style: 'header' },
                        { text: currentManual.nombre, style: 'subheader' },
                        { text: `Contenido:\n\n${currentManual.contenido}`, style: 'body' },
                        { text: `\n\nFirmado digitalmente por: ${nombre}`, style: 'firmante' },
                        { text: `Fecha: ${new Date().toLocaleString()}`, style: 'fecha' }
                    ],
                    styles: {
                        header: { fontSize: 18, bold: true, alignment: 'center' },
                        subheader: { fontSize: 14, margin: [0, 10, 0, 10] },
                        body: { fontSize: 12 },
                        firmante: { fontSize: 12, bold: true, margin: [0, 20, 0, 0] },
                        fecha: { fontSize: 10, color: 'gray' }
                    }
                };
                
                pdfMake.createPdf(docDefinition).download(`Firma_${nombre.replace(/\s+/g, '_')}.pdf`);
                alert("¡Firma exitosa!");
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.textContent = "Confirmar y Descargar PDF";
            }
        }

        // --- 4. LOGICA ADMIN ---
        async function cargarAdmin() {
            const snap = await db.collection('manuales').get();
            const container = document.getElementById('lista-manuales');
            container.innerHTML = '';
            
            snap.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <span>${data.nombre}</span>
                    <button class="btn" onclick="copiarLink('${doc.id}')">Copiar Link</button>
                `;
                container.appendChild(div);
            });
        }

        async function crearManual() {
            const nombre = document.getElementById('new-titulo').value;
            const contenido = document.getElementById('new-contenido').value;
            await db.collection('manuales').add({ nombre, contenido, firmas: [] });
            location.reload();
        }

        function copiarLink(id) {
            const url = window.location.origin + window.location.pathname + '?firma=' + id;
            navigator.clipboard.writeText(url);
            alert("Link copiado");
        }
    </script>
</body>
</html>
