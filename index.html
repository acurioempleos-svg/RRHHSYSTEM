<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH System</title>
    <script>
        // Function to initialize the system
        function init() {
            console.log('Initializing RRHH System');
            // Other initialization code...
        }

        // Function to validate user input
        function validateInput(input) {
            if (input === '') {
                alert('Input cannot be empty.');
                return false;
            }
            return true;
        }

        // Function to submit data
        function submitData() {
            const userInput = document.getElementById('userInput').value;
            if (validateInput(userInput)) {
                // Submit data logic here...
                console.log('Data submitted: ', userInput);
            }
        }
    </script>
</head>
<body onload="init()">
    <h1>Welcome to RRHH System</h1>
    <input type="text" id="userInput" placeholder="Enter your data..."><br>
    <button onclick="submitData()">Submit</button>
</body>
</html>
