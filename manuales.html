<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RRHH · Manuales y Documentos</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>

<div id="nav-root"></div>

<div id="layout-body">
<div id="main">
<div class="module active" id="module-manuales">
  <div class="module-header">
    <div class="module-icon" style="background:color-mix(in srgb,var(--m9) 15%,var(--surface2));color:var(--m9)">📋</div>
    <div class="module-title-group">
      <div class="module-eyebrow">Módulo 10</div>
      <div class="module-title">Manuales y Documentos</div>
      <div class="module-desc">Generá documentos para firma digital y seguí quién los firmó.</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
      <button class="bj-btn bj-btn-outline" id="man-predef-btn" onclick="manuales.cargarPredefinidos()"
        style="border-color:var(--m9);color:var(--m9);font-size:12px">
        📥 Cargar manuales predefinidos
      </button>
      <button class="bj-btn" style="background:var(--m9);color:#ffffff" onclick="manuales.abrirNuevo()">+ Nuevo documento</button>
    </div>
  </div>

  <div class="man-toolbar">
    <div class="man-tabs">
      <div class="man-tab active" data-loc="" onclick="manuales.filtrarLocal('',this)">TODOS</div>
      <div id="man-local-chips"></div>
    </div>
    <input class="bj-search" style="max-width:220px" placeholder="Buscar documento…" oninput="manuales.buscar(this.value)">
    <span id="man-count" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)"></span>
  </div>

  <div class="man-grid" id="man-grid">
    <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px">Cargando…</div>
  </div>
</div>

<!-- MODAL: Nuevo / editar documento -->
<div class="bj-modal-overlay" id="man-nuevo-overlay" onclick="manuales.cerrarNuevo(event)">
  <div class="bj-modal" style="max-width:580px" onclick="event.stopPropagation()">
    <div class="bj-modal-header">
      <div>
        <div class="bj-modal-tag" style="color:var(--m9)" id="man-nuevo-tag">Nuevo documento</div>
        <div class="bj-modal-title" id="man-nuevo-titulo">Crear documento para firma</div>
      </div>
      <button class="bj-modal-close" onclick="manuales.cerrarNuevo()">✕</button>
    </div>
    <div class="bj-modal-body" style="display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto">
      <input type="hidden" id="man-doc-id">
      <div class="bj-section-sep">Identificación</div>
      <div class="bj-form-row">
        <div class="bj-field bj-field-wide">
          <label class="bj-label">Nombre del documento *</label>
          <input class="bj-input" id="man-nombre-inp" placeholder="Ej: Manual de Ingreso">
        </div>
        <div class="bj-field">
          <label class="bj-label">Local / empresa</label>
          <select class="bj-input" id="man-local-inp">
            <option value="">— todos —</option>
          </select>
        </div>
      </div>
      <div class="bj-section-sep">Contenido visible al firmante</div>
      <div style="font-size:12px;color:var(--muted)">Este texto es lo que verá la persona antes de firmar.</div>
      <textarea class="bj-input" id="man-contenido-inp" rows="10"
        placeholder="Escribí aquí el contenido del documento…"
        style="resize:vertical;font-family:'Syne',sans-serif;font-size:13px;line-height:1.6"></textarea>
      <div class="bj-section-sep">PDF adjunto (opcional)</div>
      <div class="bj-field">
        <label class="bj-label">URL del PDF (Google Drive, Dropbox, etc.)</label>
        <input class="bj-input" id="man-pdf-inp" type="url" placeholder="https://…">
      </div>
      <div id="man-nuevo-error" style="color:var(--danger);font-size:12px;min-height:16px"></div>
    </div>
    <div class="bj-modal-footer">
      <button class="bj-btn bj-btn-outline" onclick="manuales.cerrarNuevo()">Cancelar</button>
      <button class="bj-btn" id="man-save-btn" style="background:var(--m9);color:#ffffff" onclick="manuales.guardar()">Guardar documento</button>
    </div>
  </div>
</div>
</div>
</div>

<script src="../shared/firebase-config.js"></script>
<script src="../shared/auth-guard.js"></script>
<script src="../shared/nav.js"></script>
<script>
const manuales = (() => {
  const COL = 'manuales';
  let _docs    = [];
  let _filtLoc = '';
  let _filtQ   = '';
  let _unsub   = null;
  let _locales = [];

  const $ = id => document.getElementById(id);
  const esc = v => String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const MANUALES_PREDEFINIDOS = [
    {
      nombre: 'Manual de Ingreso — Tanta', local: 'Tanta',
      contenido: `MANUAL DE INGRESO\nPautas de Bienvenida y Normas Internas — Tanta\n\n¡Bienvenido/a al equipo!\n\nNos alegra que te sumes. Creemos que la gastronomía se construye todos los días con compromiso, responsabilidad y trabajo en equipo.\n\nNUESTRAS PAUTAS DE CONVIVENCIA\n\n• Puntualidad y Asistencia: Cumplir con los horarios establecidos. Tolerancia de 15 minutos en máximo 2 ocasiones mensuales.\n• Actitud y Respeto: Mantener buena predisposición y respeto hacia compañeros, encargados y clientes.\n• Higiene y Seguridad: Cumplir estrictamente con las normas de higiene, seguridad y orden.\n• Procedimientos: Respetar los procedimientos internos y la organización del local.\n• Cuidado de Recursos: Cuidar las herramientas de trabajo y los recursos de la empresa.\n• Capacitación: Participar de las capacitaciones.\n\n1. PROCESO DE PRUEBA E INDUCCIÓN\n\n• Todos los días de prueba realizados son remunerados.\n• En caso de continuar, se pagan junto con el sueldo del 5 al 10 del mes siguiente.\n• No presentarse implica la baja del proceso.\n\n2. ADELANTOS Y SUELDOS\n\nAdelantos: Solicitud del 15 al 20 — Entrega del 21 al 25.\nSueldos: Se abonan entre los días 5 y 10 de cada mes.\n\nCONSTANCIA DE CONFORMIDAD\nDeclaro haber recibido, leído y comprendido el manual de ingreso.`
    },
    {
      nombre: 'Manual de Ingreso — La Mar', local: 'La Mar',
      contenido: `MANUAL DE INGRESO\nPautas de Bienvenida y Normas Internas — La Mar Cebichería Peruana\n\n¡Bienvenido/a al equipo!\n\nNUESTRAS PAUTAS DE CONVIVENCIA\n\n• Puntualidad y Asistencia: Tolerancia de 15 minutos en máximo 2 ocasiones mensuales.\n• Actitud y Respeto: Respeto hacia compañeros, encargados y clientes.\n• Higiene y Seguridad: Normas de higiene y seguridad del puesto.\n• Procedimientos y Recursos: Respetar organización y cuidar herramientas.\n\n1. PROCESO DE PRUEBA: Todos los días son remunerados.\n2. ADELANTOS: Solicitud del 15 al 20 — Entrega del 21 al 25.\n3. SUELDOS: Entre los días 5 y 10 de cada mes.\n\nCONSTANCIA DE CONFORMIDAD\nDeclaro haber recibido, leído y comprendido el manual de ingreso.`
    },
    {
      nombre: 'Manual de Ingreso — Barra Chalaca', local: 'Barra Chalaca',
      contenido: `MANUAL DE INGRESO\nPautas de Bienvenida y Normas Internas — Barra Chalaca\n\n¡Bienvenido/a al equipo!\n\nNUESTRAS PAUTAS DE CONVIVENCIA\n\n• Puntualidad y Asistencia: Tolerancia de 15 minutos en máximo 2 ocasiones mensuales.\n• Actitud y Respeto: Respeto hacia compañeros, encargados y clientes.\n• Higiene y Seguridad: Cumplir normas de higiene y seguridad.\n• Procedimientos y Recursos: Respetar organización y cuidar herramientas.\n\n1. PROCESO DE PRUEBA: Todos los días son remunerados.\n2. ADELANTOS: Solicitud del 15 al 20 — Entrega del 21 al 25.\n3. SUELDOS: Entre los días 5 y 10 de cada mes.\n\nCONSTANCIA DE CONFORMIDAD\nDeclaro haber recibido, leído y comprendido el manual de ingreso.`
    },
  ];

  async function cargarPredefinidos() {
    if (!db) { alert('Firebase no disponible'); return; }
    const btn = $('man-predef-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Cargando…'; }
    try {
      const snap = await db.collection(COL).get();
      const existentes = snap.docs.map(d => d.data().nombre || '');
      let creados = 0;
      for (const m of MANUALES_PREDEFINIDOS) {
        if (existentes.includes(m.nombre)) continue;
        await db.collection(COL).add({ ...m, firmas: [], creadoAt: new Date().toISOString(), updatedAt: new Date().toISOString(), predefinido: true });
        creados++;
      }
      alert(creados === 0 ? 'Los 3 manuales ya estaban cargados.' : `✓ Se cargaron ${creados} manual${creados > 1 ? 'es' : ''}.`);
    } catch(e) { alert('Error: ' + e.message); }
    finally { if (btn) { btn.disabled = false; btn.textContent = '📥 Cargar manuales predefinidos'; } }
  }

  function init() {
    _locales = typeof adminLocales !== 'undefined' && adminLocales.getLocales ? adminLocales.getLocales() : [];
    _poblarLocalSelect();
    _poblarChips();
    if (!db) { _render(); return; }
    if (_unsub) _unsub();
    _unsub = db.collection(COL).orderBy('creadoAt','desc')
      .onSnapshot(snap => {
        _docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        _render();
      }, () => {
        _unsub = db.collection(COL).onSnapshot(snap => {
          _docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          _render();
        });
      });
  }

  function _poblarLocalSelect() {
    const el = $('man-local-inp'); if (!el) return;
    const cur = el.value;
    el.innerHTML = '<option value="">— todos —</option>' +
      _locales.map(l => { const n=l.nombre||l; return `<option value="${esc(n)}"${n===cur?' selected':''}>${esc(n)}</option>`; }).join('');
  }

  function _poblarChips() {
    const cont = $('man-local-chips'); if (!cont) return;
    cont.innerHTML = _locales.map(l => {
      const n = l.nombre||l;
      return `<div class="man-tab${_filtLoc===n?' active':''}" onclick="manuales.filtrarLocal('${esc(n)}',this)">${esc(n)}</div>`;
    }).join('');
  }

  function _render() {
    const grid = $('man-grid'); if (!grid) return;
    let lista = _docs.filter(d => {
      if (_filtLoc && d.local && d.local !== _filtLoc) return false;
      if (_filtQ && !(d.nombre||'').toLowerCase().includes(_filtQ)) return false;
      return true;
    });
    const cnt = $('man-count');
    if (cnt) cnt.textContent = `${lista.length} doc${lista.length!==1?'s':''}`;
    if (!lista.length) {
      grid.innerHTML = `<div class="man-empty-state"><div class="man-empty-state-icon">📋</div>${_docs.length ? 'Sin resultados.' : 'No hay documentos aún.'}</div>`;
      return;
    }
    grid.innerHTML = lista.map(d => _cardHTML(d)).join('');
  }

  function _cardHTML(d) {
    const firmas = d.firmas || [];
    const total  = firmas.length;
    const baseUrl = location.href.split('?')[0].replace('modulos/manuales.html','');
    const url    = `${baseUrl}index.html?firma=${d.id}`;
    const shortUrl = url.length > 55 ? url.slice(0,52)+'…' : url;

    return `
    <div class="man-card">
      <div class="man-card-head">
        <div class="man-card-icon">📋</div>
        <div style="flex:1;min-width:0">
          <div class="man-card-name">${esc(d.nombre)}${d.predefinido ? ' <span class="man-badge-oficial">OFICIAL</span>' : ''}</div>
          <div class="man-card-meta">${d.local ? `<span style="color:var(--mA)">${esc(d.local)}</span> · ` : 'Todos los locales · '}${_fmtFecha(d.creadoAt)}</div>
        </div>
        <div class="man-card-actions">
          <button class="bj-icon-btn" title="Editar" onclick="manuales.editar('${d.id}')">✏</button>
          <button class="bj-icon-btn del" title="Eliminar" onclick="manuales.eliminar('${d.id}','${esc(d.nombre)}')">✕</button>
        </div>
      </div>
      <div class="man-card-body">
        <div class="man-stat-row">
          <div class="man-stat"><div class="man-stat-val">${total}</div><div class="man-stat-lbl">Firmas recibidas</div></div>
          <div class="man-stat" style="border-color:color-mix(in srgb,var(--m2) 25%,var(--border))">
            <div class="man-stat-val pct">${d.contenido ? Math.ceil(d.contenido.length / 5) : 0}</div>
            <div class="man-stat-lbl">Palabras aprox.</div>
          </div>
        </div>
        <div class="man-link-copy">
          <span class="man-link-url" title="${esc(url)}">${esc(shortUrl)}</span>
          <button class="man-link-copy-btn" onclick="manuales.copiarLink('${esc(url)}',this)">📋 Copiar link</button>
        </div>
        ${total > 0 ? `
          <div class="man-firmas-header">
            <span>Firmantes recientes</span>
            ${total > 5 ? `<span style="color:var(--mA)">+${total-5} más</span>` : ''}
          </div>
          <div class="man-firmas-list">
            ${firmas.slice(-5).reverse().map(f => {
              const initials = (f.nombre||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
              return `<div class="man-firma-row">
                <div class="man-firma-avatar">${initials}</div>
                <span class="man-firma-nombre">${esc(f.nombre)}</span>
                <span class="man-firma-fecha">${_fmtFecha(f.at)}</span>
                <span class="man-firma-check">✓</span>
                <button class="man-firma-del" onclick="manuales.quitarFirma('${d.id}','${esc(f.nombre).replace(/'/g,"\\'")}','${f.at}')" title="Quitar firma">✕</button>
              </div>`;
            }).join('')}
          </div>` :
          `<div class="man-empty-firmas">Sin firmas aún — compartí el link con los empleados</div>`
        }
      </div>
    </div>`;
  }

  function filtrarLocal(loc, chip) {
    _filtLoc = loc;
    document.querySelectorAll('.man-tab').forEach(c=>c.classList.remove('active'));
    if (chip) chip.classList.add('active');
    _render();
  }
  function buscar(v) { _filtQ = v.toLowerCase(); _render(); }

  function copiarLink(url, btn) {
    navigator.clipboard?.writeText(url).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copiado!'; btn.style.color = 'var(--m2)';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
    }).catch(() => prompt('Copiá este link:', url));
  }

  function abrirNuevo() {
    $('man-doc-id').value = '';
    $('man-pdf-inp').value = '';
    $('man-nuevo-tag').textContent = 'Nuevo documento';
    $('man-nuevo-titulo').textContent = 'Crear documento para firma';
    $('man-nombre-inp').value = '';
    $('man-contenido-inp').value = '';
    $('man-nuevo-error').textContent = '';
    _poblarLocalSelect();
    $('man-local-inp').value = '';
    $('man-nuevo-overlay').classList.add('open');
    setTimeout(() => $('man-nombre-inp')?.focus(), 80);
  }

  function editar(id) {
    const d = _docs.find(x=>x.id===id); if (!d) return;
    $('man-doc-id').value = id;
    $('man-nuevo-tag').textContent = 'Editar documento';
    $('man-nuevo-titulo').textContent = 'Editar: ' + (d.nombre||'');
    $('man-nombre-inp').value = d.nombre || '';
    $('man-contenido-inp').value = d.contenido || '';
    $('man-pdf-inp').value = d.pdfUrl || '';
    $('man-nuevo-error').textContent = '';
    _poblarLocalSelect();
    $('man-local-inp').value = d.local || '';
    $('man-nuevo-overlay').classList.add('open');
  }

  function cerrarNuevo(e) {
    if (e && e.target !== $('man-nuevo-overlay')) return;
    $('man-nuevo-overlay').classList.remove('open');
  }

  async function guardar() {
    const nombre    = ($('man-nombre-inp').value||'').trim();
    const contenido = ($('man-contenido-inp').value||'').trim();
    if (!nombre)    { $('man-nuevo-error').textContent = 'El nombre es obligatorio.'; return; }
    if (!contenido) { $('man-nuevo-error').textContent = 'El contenido no puede estar vacío.'; return; }
    const data = { nombre, contenido, pdfUrl: ($('man-pdf-inp').value||'').trim(), local: $('man-local-inp').value||'', updatedAt: new Date().toISOString() };
    const btn = $('man-save-btn');
    btn.disabled = true; btn.textContent = 'Guardando…';
    try {
      if (!db) throw new Error('Firebase no disponible');
      const docId = $('man-doc-id').value;
      if (docId) { await db.collection(COL).doc(docId).update(data); }
      else { data.creadoAt = data.updatedAt; data.firmas = []; await db.collection(COL).add(data); }
      $('man-nuevo-overlay').classList.remove('open');
    } catch(e) { $('man-nuevo-error').textContent = 'Error: ' + e.message; }
    finally { btn.disabled = false; btn.textContent = 'Guardar documento'; }
  }

  async function eliminar(id, nombre) {
    if (!confirm(`¿Eliminar "${nombre}" y todas sus firmas?`)) return;
    try { await db.collection(COL).doc(id).delete(); } catch(e) { alert(e.message); }
  }

  async function quitarFirma(docId, nombre, at) {
    if (!confirm(`¿Quitar la firma de "${nombre}"?`)) return;
    try {
      const snap = await db.collection(COL).doc(docId).get();
      if (!snap.exists) return;
      const firmas = (snap.data().firmas||[]).filter(f=>!(f.nombre===nombre&&f.at===at));
      await db.collection(COL).doc(docId).update({ firmas });
    } catch(e) { alert(e.message); }
  }

  function _fmtFecha(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
    catch { return iso; }
  }

  return { init, filtrarLocal, buscar, copiarLink, abrirNuevo, editar, cerrarNuevo, guardar, eliminar, quitarFirma, cargarPredefinidos };
})();

window._onAuthReady = function(user, rol, localAsignado) {
  manuales.init();
};
</script>
</body>
</html>
